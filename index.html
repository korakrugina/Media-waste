<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR izložba</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs>

      <!-- kamera -->
      <a-entity camera></a-entity>

      <!-- marker -->
      <a-marker preset="hiro">

        <!-- MODEL 1 -->
        <a-entity 
          gltf-model="url(model1.glb)"
          position="0 0 0"
          scale="0.5 0.5 0.5">
        </a-entity>

        <!-- MODEL 2 -->
        <a-entity 
          gltf-model="url(model2.glb)"
          position="1 0 0"
          scale="0.5 0.5 0.5">
        </a-entity>

      </a-marker>

    </a-scene>

  </body>
</html>
