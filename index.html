<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR izložba - world mode</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  </head>

  <body style="margin: 0; overflow: hidden;">

    <a-scene>

      <!-- KAMERA (ovo je korisnik) -->
      <a-entity camera position="0 1.6 0"></a-entity>

      <!-- SVJETLO -->
      <a-light type="ambient" intensity="0.8"></a-light>

      <!-- SRCE -->
      <a-entity
        gltf-model="url(srce_ar.glb)"
        position="0 1.5 -3"
        scale="0.5 0.5 0.5">
      </a-entity>

      <!-- PROPALI PROJEKT -->
      <a-entity
        gltf-model="url(propaliprojekt_ar.glb)"
        position="2 1.5 -4"
        scale="0.5 0.5 0.5">
      </a-entity>

      <!-- FBSLOP -->
      <a-entity
        gltf-model="url(fbslop_ar.glb)"
        position="-2 1.5 -4"
        scale="0.5 0.5 0.5">
      </a-entity>

      <!-- SLOP -->
      <a-entity
        gltf-model="url(slop_ar.glb)"
        position="0 1.5 -6"
        scale="0.5 0.5 0.5">
      </a-entity>

      <!-- RODJENDAN -->
      <a-entity
        gltf-model="url(rodjendan_ar.glb)"
        position="3 1.5 -5"
        scale="0.5 0.5 0.5">
      </a-entity>

    </a-scene>

  </body>
</html>
