<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR izložba</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs>

      <!-- kamera -->
      <a-entity camera></a-entity>

      <!-- marker -->
      <a-marker preset="hiro">

        <!-- SRCE -->
        <a-entity 
          gltf-model="url(srce_ar.glb)"
          position="0 0 -2"
          scale="0.5 0.5 0.5">
        </a-entity>

        <!-- PROPALI PROJEKT -->
        <a-entity 
          gltf-model="url(propaliprojekt_ar.glb)"
          position="2 0 -3"
          scale="0.5 0.5 0.5">
        </a-entity>

        <!-- FBSLOP -->
        <a-entity 
          gltf-model="url(fbslop_ar.glb)"
          position="-2 0 -3"
          scale="0.5 0.5 0.5">
        </a-entity>

        <!-- SLOP -->
        <a-entity 
          gltf-model="url(slop_ar.glb)"
          position="0 0 -5"
          scale="0.5 0.5 0.5">
        </a-entity>

        <!-- RODJENDAN (bez đ!) -->
        <a-entity 
          gltf-model="url(rodjendan_ar.glb)"
          position="3 0 -4"
          scale="0.5 0.5 0.5">
        </a-entity>

      </a-marker>

    </a-scene>

  </body>
</html>
